<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        
        <!-- LEFT COLUMN: Inputs -->
        <div class="left-panel">
            <header>
                <h1>My Tasks</h1>
                <p>Add and schedule new items</p>
            </header>

            <div class="input-box">
                <label>Task Description</label>
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
                
                <label>Date & Time</label>
                <div class="scheduling-row">
                    <input type="date" id="date-input" title="Date">
                    <input type="time" id="time-input" title="Time">
                </div>

                <button id="add-btn" class="add-btn">Add Task</button>
            </div>
        </div>

        <!-- RIGHT COLUMN: Task List -->
        <div class="right-panel">
            <div class="list-header">
                <h2>Current Tasks</h2>
                <span id="task-count" class="badge">0 tasks remaining</span>
            </div>

            <ul id="task-list" class="task-list">
                <!-- Tasks will appear here -->
            </ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
